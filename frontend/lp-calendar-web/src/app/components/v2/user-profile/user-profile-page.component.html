<p-card class="mt-3">
  <ng-template #title>
    Your profile
  </ng-template>

  <p-button label="Edit" icon="pi pi-pencil" [routerLink]="['/users', userId$]" [disabled]="userId$.length == 0" variant="outlined" />

  <div class="grid gap-2 mt-2">
    <!-- ID -->
    <div class="col-12">
      <label for="id">ID</label>
      <input pInputText id="id" disabled autocomplete="off" fluid [value]="userId$" />
    </div>

    <!-- Username -->
    <div class="col-12">
      <label for="usernameInput">Username</label>
      <input pInputText id="usernameInput" disabled autocomplete="off" fluid [value]="username$" />
    </div>

    <!-- E-Mail -->
    <div class="col-12">
      <label for="emailInput">E-Mail address</label>
      <input pInputText id="emailInput" disabled autocomplete="off" fluid [value]="email$" />
    </div>

    <div class="col-12">
      <label for="groupsSelect">Groups</label>
      <select multiple disabled class="form-control" id="groupsSelect">
        @for (groupName of groupNames$; track groupName) {
          <option>{{ groupName }}</option>
        }
      </select>
      <small>Only administrators can add you to groups which grant you certain permissions on the site.</small>
    </div>
  </div>
</p-card>
