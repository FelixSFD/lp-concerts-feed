<p-toast />

<p-card>
  <ng-template #title>
    Manage users
  </ng-template>

  <p-table
    #dt2
    [value]="users$"
    dataKey="id"
    stripedRows
    rowHover
    [rows]="25"
    [rowsPerPageOptions]="[10, 25, 50, 100]"
    [loading]="isLoading$"
    [paginator]="true"
    [globalFilterFields]="['title']"
    [tableStyle]="{ 'min-width': '75rem' }"
  >
    <ng-template #caption>
      <div class="flex">
        <p-iconfield iconPosition="left" class="ml-auto">
          <p-inputicon>
            <i class="pi pi-search"></i>
          </p-inputicon>
          <input pInputText type="text" [(ngModel)]="globalSearchText$" (input)="dt2.filterGlobal(globalSearchText$, 'contains')" placeholder="Search keyword" />
        </p-iconfield>
      </div>
    </ng-template>
    <ng-template #header>
      <tr>
        <th scope="col">Username</th>
        <th scope="col">E-Mail</th>
        <th scope="col"></th>
      </tr>
      <tr>
        <th>
          <p-column-filter type="text" field="username" placeholder="Username" ariaLabel="Filter Username" filterOn="input" showClearButton></p-column-filter>
        </th>
        <th>
          <p-column-filter type="text" field="email" placeholder="E-mail" ariaLabel="Filter E-mail" filterOn="input" showClearButton></p-column-filter>
        </th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template #body let-user>
      <tr>
        <td>
          {{ user.username }}
        </td>
        <td>{{ user.email }} @if (user.emailVerified) {
          <i class="bi bi-patch-check-fill text-success" ngbTooltip="verified"></i>
        }</td>
        <td>
          <p-button-group>
            <p-button label="Edit" icon="pi pi-pencil" variant="outlined" size="small" [routerLink]="[user.id.toString()]" />
          </p-button-group>
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="5">No users found.</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
