<p-confirmDialog />

<p-card>
  <ng-template #title>
    Manage setlists
  </ng-template>

  <p-table
    #dt2
    [value]="setlists$"
    dataKey="id"
    stripedRows
    rowHover
    [rows]="25"
    [rowsPerPageOptions]="[10, 25, 50, 100]"
    [loading]="isLoading$"
    [paginator]="true"
    [globalFilterFields]="['concertTitle', 'setName']"
    [tableStyle]="{ 'min-width': '75rem' }"
  >
    <ng-template #caption>
      <div class="flex">
        <p-button variant="outlined" label="Add setlist" [routerLink]="['add']" />

        <p-iconfield iconPosition="left" class="ml-auto">
          <p-inputicon>
            <i class="pi pi-search"></i>
          </p-inputicon>
          <input pInputText type="text" [(ngModel)]="globalSearchText$" (input)="dt2.filterGlobal(globalSearchText$, 'contains')" placeholder="Search keyword" />
        </p-iconfield>
      </div>
    </ng-template>
    <ng-template #header>
      <tr>
        <th scope="col">Concert Title</th>
        <th scope="col">Set Name</th>
        <th scope="col"></th>
      </tr>
      <tr>
        <th>
          <p-column-filter type="text" field="concertTitle" placeholder="Concert title" ariaLabel="Filter Concert Title" filterOn="input"></p-column-filter>
        </th>
        <th>
          <p-column-filter type="text" field="setName" placeholder="Set name" ariaLabel="Filter Set Name"></p-column-filter>
        </th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template #body let-setlist>
      <tr>
        <td>
          {{ setlist.concertTitle }}
        </td>
        <td>
          {{ setlist.setName }}
        </td>
        <td>
          <p-button-group>
            <p-button label="Edit" icon="pi pi-pencil" variant="outlined" size="small" [routerLink]="[setlist.id.toString()]" [disabled]="setlistDeleting$" />
            <p-button label="Delete" icon="pi pi-trash" variant="outlined" size="small" severity="danger" (click)="onDeleteSetlistClicked($event, setlist)" [disabled]="setlistDeleting$" />
          </p-button-group>
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="5">No setlists found.</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
