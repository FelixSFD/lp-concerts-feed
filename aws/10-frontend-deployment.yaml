AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Application to manage the Frontend deployment for the LP Calendar project



Parameters:
  BaseProductName:
    Description: Name of the product. Is used as prefix in the exports
    Type: String
  FrontendBucketRegions:
    Type: CommaDelimitedList
    Description: Regions where a copy of the frontend files will exist. index 0 must be the primary region. (single source of truth)

Conditions:
  IsPrimaryReplicationRegion: !Equals
    - !Ref AWS::Region
    - !Select [0, !Ref FrontendBucketRegions]

Resources:
  # S3 bucket for Angular frontend
  FrontendS3Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub ${BaseProductName}-web-frontend-bucket-${AWS::Region}
      Tags:
        - Key: "ProductName"
          Value: "lpcalendar"
        - Key: "Stage"
          Value: !Ref BaseProductName
        - Key: "Category"
          Value: "frontend"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      VersioningConfiguration:
        Status: Enabled
      ReplicationConfiguration: !If
        - IsPrimaryReplicationRegion
        - Role: !GetAtt ReplicationRole.Arn
          Rules:
            - Id: !Join
                - '-'
                - - replicate-to
                  - !Select [1, !Ref FrontendBucketRegions]
              Status: Enabled
              Priority: 1
              Filter:
                Prefix: ""
              DeleteMarkerReplication:
                Status: Enabled
              Destination:
                Bucket: !Join
                  - '-'
                  - - !Sub arn:aws:s3:::${BaseProductName}-web-frontend-bucket
                    - !Select [1, !Ref FrontendBucketRegions]
            - Id: !Join
                - '-'
                - - replicate-to
                  - !Select [2, !Ref FrontendBucketRegions]
              Status: Enabled
              Priority: 2
              Filter:
                Prefix: ""
              DeleteMarkerReplication:
                Status: Enabled
              Destination:
                Bucket: !Join
                  - '-'
                  - - !Sub arn:aws:s3:::${BaseProductName}-web-frontend-bucket
                    - !Select [2, !Ref FrontendBucketRegions]
            - Id: !Join
                - '-'
                - - replicate-to
                  - !Select [3, !Ref FrontendBucketRegions]
              Status: Enabled
              Priority: 3
              Filter:
                Prefix: ""
              DeleteMarkerReplication:
                Status: Enabled
              Destination:
                Bucket: !Join
                  - '-'
                  - - !Sub arn:aws:s3:::${BaseProductName}-web-frontend-bucket
                    - !Select [3, !Ref FrontendBucketRegions]
        - !Ref AWS::NoValue
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
  BucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      PolicyDocument:
        Id: !Sub ${AWS::StackName}_PublicS3Policy
        Version: 2012-10-17
        Statement:
          - Sid: PublicReadForGetBucketObjects
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Join
              - ''
              - - 'arn:aws:s3:::'
                - !Ref FrontendS3Bucket
                - /*
      Bucket: !Ref FrontendS3Bucket

  ReplicationRole:
    Type: AWS::IAM::Role
    Condition: IsPrimaryReplicationRegion
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReplicationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetReplicationConfiguration
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${BaseProductName}-web-frontend-bucket-${AWS::Region}
              - Effect: Allow
                Action:
                  - s3:GetObjectVersionForReplication
                  - s3:GetObjectVersionAcl
                  - s3:GetObjectVersionTagging
                Resource:
                  - !Sub arn:aws:s3:::${BaseProductName}-web-frontend-bucket-${AWS::Region}/*
              - Effect: Allow
                Action:
                  - s3:ReplicateObject
                  - s3:ReplicateDelete
                  - s3:ReplicateTags
                Resource:
                  - !Sub arn:aws:s3:::${BaseProductName}-web-frontend-bucket-*/*

Outputs:
  FrontendS3BucketExport:
    Description: 'S3 Bucket for the frontend files'
    Value: !Sub '${BaseProductName}-web-frontend-bucket'
    Export:
      Name: !Sub '${BaseProductName}-frontend-s3'
  FrontendS3BucketRegionalDomainExport:
    Description: 'S3 Bucket for the frontend files'
    Value: !Sub '${BaseProductName}-web-frontend-bucket.s3.eu-central-1.amazonaws.com'
    Export:
      Name: !Sub '${BaseProductName}-frontend-s3-regional-domain'
  FrontendS3BucketArnExport:
    Description: 'S3 Bucket for the frontend files'
    Value: !Sub 'arn:aws:s3:::${BaseProductName}-web-frontend-bucket'
    Export:
      Name: !Sub '${BaseProductName}-frontend-s3-arn'
  FrontendS3BucketExportRegional:
    Description: 'S3 Bucket for the frontend files'
    Value: !Ref FrontendS3Bucket
    Export:
      Name: !Sub '${BaseProductName}-frontend-s3-${AWS::Region}'
  FrontendS3BucketRegionalDomainExportRegional:
    Description: 'S3 Bucket for the frontend files'
    Value: !GetAtt FrontendS3Bucket.RegionalDomainName
    Export:
      Name: !Sub '${BaseProductName}-frontend-s3-regional-domain-${AWS::Region}'
  FrontendS3BucketArnExportRegional:
    Description: 'S3 Bucket for the frontend files'
    Value: !GetAtt FrontendS3Bucket.Arn
    Export:
      Name: !Sub '${BaseProductName}-frontend-s3-arn-${AWS::Region}'
